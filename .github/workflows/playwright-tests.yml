name: Playwright UI Tests

on:
  # Called by the deployment pipeline after QA deploy
  workflow_dispatch:

  # Run on push to cureSetup branch for pre-merge validation
  push:
    branches:
      - cureSetup

  # Also allow scheduled nightly run (optional)
  # schedule:
  #   - cron: '0 2 * * *'   # 2am UTC daily

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download CATO Client
        run: |
          wget https://clientdownload.catonetworks.com/public/clients/cato-client-install.deb -O cato-client.deb
          sudo dpkg -i cato-client.deb

      - name: Configure and Connect CATO
        run: |
          echo "=== CATO Configuration Starting ==="

          # Start CATO daemon service
          echo "Starting CATO daemon service..."
          sudo systemctl start cato-client
          sudo systemctl status cato-client

          # Wait for daemon to be ready
          echo "Waiting for CATO daemon to initialize..."
          sleep 5

          # Connect to CATO network with account subdomain and user
          echo "Connecting to CATO network..."
          echo "$CATO_PASSWORD" | cato-sdp start --account cure --user "$CATO_USERNAME" --no-sso

          # Wait for connection to establish
          echo "Waiting for CATO connection to establish..."
          sleep 10

          # Check CATO status
          echo "Checking CATO status..."
          cato-sdp status

          echo "=== CATO Configuration Complete ==="
        env:
          CATO_USERNAME: ${{ secrets.CATO_USERNAME }}
          CATO_PASSWORD: ${{ secrets.CATO_PASSWORD }}

      - name: Verify CATO Connection
        run: |
          echo "=== CATO Connectivity Verification ==="

          # Check if CATO is connected
          if ! cato-sdp status | grep -qi "connected"; then
            echo "ERROR: CATO VPN not connected"
            cato-sdp status
            exit 1
          fi

          echo "✓ CATO is connected"

          # Test connectivity to BASE_URL
          echo "Testing BASE_URL connectivity..."
          curl -v --max-time 15 "$BASE_URL" -o /dev/null -w "HTTP Status: %{http_code}\n" || {
            echo "WARNING: Could not reach BASE_URL, but continuing with tests"
          }

          echo "=== Verification Complete ==="
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Write .env file
        run: |
          echo "BASE_URL=$BASE_URL" >> .env.et
          echo "USER_ADMIN_USERNAME=$USER_ADMIN_USERNAME" >> .env.et
          echo "USER_ADMIN_PASSWORD=$USER_ADMIN_PASSWORD" >> .env.et
          echo "USER_DOCTOR_USERNAME=$USER_DOCTOR_USERNAME" >> .env.et
          echo "USER_DOCTOR_PASSWORD=$USER_DOCTOR_PASSWORD" >> .env.et
          echo "USER_NURSE_USERNAME=$USER_NURSE_USERNAME" >> .env.et
          echo "USER_NURSE_PASSWORD=$USER_NURSE_PASSWORD" >> .env.et
          echo "USER_RECEPTIONIST_USERNAME=$USER_RECEPTIONIST_USERNAME" >> .env.et
          echo "USER_RECEPTIONIST_PASSWORD=$USER_RECEPTIONIST_PASSWORD" >> .env.et
          echo "DEFAULT_LOCATION=$DEFAULT_LOCATION" >> .env.et
          echo "CATO_USERNAME=$CATO_USERNAME" >> .env.et
          echo "CATO_PASSWORD=$CATO_PASSWORD" >> .env.et
          echo "CATO_API_KEY=$CATO_API_KEY" >> .env.et
          echo "HEADLESS=true" >> .env.et
          echo "TIMEOUT=60000" >> .env.et
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_ADMIN_USERNAME: ${{ secrets.USER_ADMIN_USERNAME }}
          USER_ADMIN_PASSWORD: ${{ secrets.USER_ADMIN_PASSWORD }}
          USER_DOCTOR_USERNAME: ${{ secrets.USER_DOCTOR_USERNAME }}
          USER_DOCTOR_PASSWORD: ${{ secrets.USER_DOCTOR_PASSWORD }}
          USER_NURSE_USERNAME: ${{ secrets.USER_NURSE_USERNAME }}
          USER_NURSE_PASSWORD: ${{ secrets.USER_NURSE_PASSWORD }}
          USER_RECEPTIONIST_USERNAME: ${{ secrets.USER_RECEPTIONIST_USERNAME }}
          USER_RECEPTIONIST_PASSWORD: ${{ secrets.USER_RECEPTIONIST_PASSWORD }}
          DEFAULT_LOCATION: ${{ secrets.DEFAULT_LOCATION }}
          CATO_USERNAME: ${{ secrets.CATO_USERNAME }}
          CATO_PASSWORD: ${{ secrets.CATO_PASSWORD }}
          CATO_API_KEY: ${{ secrets.CATO_API_KEY }}

      - name: Run Playwright tests
        run: |
          echo "=== Starting Playwright Tests ==="
          echo "Environment: NODE_ENV=et"
          echo "Timeout: 60000ms (from env)"
          NODE_ENV=et npx playwright test tests/registration/sanity.spec.ts --project=chromium --reporter=list --reporter=html 2>&1
        env:
          DEBUG: pw:api
          PWDEBUG: 0
        continue-on-error: true   # always publish reports even if tests fail

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 30

      - name: Upload failure artifacts (screenshots, traces, videos)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: test-results/
          retention-days: 7

name: Playwright UI Tests

on:
  # Called by the deployment pipeline after QA deploy
  workflow_dispatch:

  # Run on push to cureSetup branch for pre-merge validation
  push:
    branches:
      - cureSetup

  # Also allow scheduled nightly run (optional)
  # schedule:
  #   - cron: '0 2 * * *'   # 2am UTC daily

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download CATO Client
        run: |
          wget https://clientdownload.catonetworks.com/cato-client-linux.rpm -O cato-client.rpm
          sudo rpm -ivh cato-client.rpm || true
        continue-on-error: true

      - name: Configure and Connect CATO
        run: |
          echo "=== CATO Configuration Starting ==="

          # Start CATO client service
          echo "Starting CATO client service..."
          sudo systemctl start cato-client || echo "Failed to start service"

          # Wait for service to be ready
          echo "Waiting for CATO service to initialize..."
          sleep 5

          # Check if cato-cli is available
          echo "Checking cato-cli availability..."
          which cato-cli || echo "cato-cli not found in PATH"
          cato-cli --version || echo "Could not get cato-cli version"

          # Login to CATO with verbose output
          echo "Attempting CATO login..."
          cato-cli login --username "$CATO_USERNAME" --password "$CATO_PASSWORD" -v 2>&1 || {
            echo "Login failed - checking service status"
            sudo systemctl status cato-client || true
          }

          # Connect to CATO network with verbose output
          echo "Connecting to CATO network..."
          cato-cli connect -v 2>&1 || echo "Connect command failed"

          # Wait longer for connection to establish
          echo "Waiting for CATO network connection to establish..."
          sleep 15

          # Check CATO status with detailed output
          echo "Checking CATO status..."
          cato-cli status -v 2>&1 || echo "Status check failed"

          # List network interfaces to verify tunnel
          echo "Network interfaces:"
          ip addr show || ifconfig || true

          # Test DNS resolution
          echo "Testing DNS resolution:"
          nslookup bahmni.local || host bahmni.local || dig bahmni.local || true

          echo "=== CATO Configuration Complete ==="
        env:
          CATO_USERNAME: ${{ secrets.CATO_USERNAME }}
          CATO_PASSWORD: ${{ secrets.CATO_PASSWORD }}
        continue-on-error: true

      - name: Verify CATO Connection
        run: |
          echo "=== CATO Connectivity Verification ==="

          echo "1. Checking CATO daemon status..."
          sudo systemctl is-active cato-client || echo "CATO service not running"
          sudo systemctl status cato-client 2>&1 | head -20 || true

          echo ""
          echo "2. Checking CATO CLI status..."
          cato-cli status -v 2>&1 || echo "CATO CLI status failed"

          echo ""
          echo "3. Checking network connectivity..."
          ping -c 3 8.8.8.8 || echo "Public DNS ping failed"

          echo ""
          echo "4. Testing BASE_URL connectivity..."
          echo "BASE_URL: $BASE_URL"
          curl -v --max-time 15 "$BASE_URL" 2>&1 | head -50 || echo "curl to BASE_URL failed"

          echo ""
          echo "5. Checking routing..."
          route -n || netstat -rn || ip route show || echo "Cannot show routing table"

          echo ""
          echo "6. Checking DNS..."
          cat /etc/resolv.conf || echo "Cannot read resolv.conf"

          echo ""
          echo "7. Checking for CATO tunnel interface..."
          ip addr show | grep -i tun || echo "No tunnel interface found"

          echo "=== Verification Complete ==="
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        continue-on-error: true

      - name: Write .env file
        run: |
          echo "BASE_URL=$BASE_URL" >> .env.et
          echo "USER_ADMIN_USERNAME=$USER_ADMIN_USERNAME" >> .env.et
          echo "USER_ADMIN_PASSWORD=$USER_ADMIN_PASSWORD" >> .env.et
          echo "USER_DOCTOR_USERNAME=$USER_DOCTOR_USERNAME" >> .env.et
          echo "USER_DOCTOR_PASSWORD=$USER_DOCTOR_PASSWORD" >> .env.et
          echo "USER_NURSE_USERNAME=$USER_NURSE_USERNAME" >> .env.et
          echo "USER_NURSE_PASSWORD=$USER_NURSE_PASSWORD" >> .env.et
          echo "USER_RECEPTIONIST_USERNAME=$USER_RECEPTIONIST_USERNAME" >> .env.et
          echo "USER_RECEPTIONIST_PASSWORD=$USER_RECEPTIONIST_PASSWORD" >> .env.et
          echo "DEFAULT_LOCATION=$DEFAULT_LOCATION" >> .env.et
          echo "CATO_USERNAME=$CATO_USERNAME" >> .env.et
          echo "CATO_PASSWORD=$CATO_PASSWORD" >> .env.et
          echo "CATO_API_KEY=$CATO_API_KEY" >> .env.et
          echo "HEADLESS=true" >> .env.et
          echo "TIMEOUT=60000" >> .env.et
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_ADMIN_USERNAME: ${{ secrets.USER_ADMIN_USERNAME }}
          USER_ADMIN_PASSWORD: ${{ secrets.USER_ADMIN_PASSWORD }}
          USER_DOCTOR_USERNAME: ${{ secrets.USER_DOCTOR_USERNAME }}
          USER_DOCTOR_PASSWORD: ${{ secrets.USER_DOCTOR_PASSWORD }}
          USER_NURSE_USERNAME: ${{ secrets.USER_NURSE_USERNAME }}
          USER_NURSE_PASSWORD: ${{ secrets.USER_NURSE_PASSWORD }}
          USER_RECEPTIONIST_USERNAME: ${{ secrets.USER_RECEPTIONIST_USERNAME }}
          USER_RECEPTIONIST_PASSWORD: ${{ secrets.USER_RECEPTIONIST_PASSWORD }}
          DEFAULT_LOCATION: ${{ secrets.DEFAULT_LOCATION }}
          CATO_USERNAME: ${{ secrets.CATO_USERNAME }}
          CATO_PASSWORD: ${{ secrets.CATO_PASSWORD }}
          CATO_API_KEY: ${{ secrets.CATO_API_KEY }}

      - name: Run Playwright tests
        run: |
          echo "=== Starting Playwright Tests ==="
          echo "Environment: NODE_ENV=et"
          echo "Timeout: 60000ms (from env)"
          NODE_ENV=et npx playwright test tests/registration/sanity.spec.ts --project=chromium --reporter=list --reporter=html 2>&1
        env:
          DEBUG: pw:api
          PWDEBUG: 0
        continue-on-error: true   # always publish reports even if tests fail

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 30

      - name: Upload failure artifacts (screenshots, traces, videos)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: test-results/
          retention-days: 7
